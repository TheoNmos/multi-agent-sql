services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=bird_benchmark
      - POSTGRES_USER=xiaolongli
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaolongli"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: redis-stack-server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Database settings (pydantic-settings maps these case-insensitively)
      - DB_URL=postgresql://xiaolongli:postgres@db:5432
      - DB_NAME=bird_benchmark
      # Redis settings
      - REDIS_URL=redis://redis:6379
      # API keys (set these in .env file or override here)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-somekey}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-somekey}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-somekey}
    volumes:
      # Mount benchmark results directory if you want persistence
      - ./benchmark_results:/app/benchmark_results
      # Mount datasets if you have them locally
      - ./datasets:/app/datasets:ro
      - ./bird:/app/bird:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
